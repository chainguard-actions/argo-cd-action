name: Test basic - install default version
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
      - name: Assert argocd is installed
        run: |
          which argocd || { echo "FAIL: argocd not found in PATH"; exit 1; }
          argocd version --client 2>&1 | grep -q "argocd" || { echo "FAIL: argocd version output unexpected"; exit 1; }
          echo "PASS: argocd is installed"
