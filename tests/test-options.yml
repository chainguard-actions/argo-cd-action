name: Test command with options input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          version: "3.3.2"
          command: help
          options: "--help"
      - name: Assert output contains help content
        env:
          ACTUAL: ${{ steps.action.outputs.output }}
        run: |
          echo "actual: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: expected non-empty output from argocd help"
            exit 1
          fi
          echo "PASS"
