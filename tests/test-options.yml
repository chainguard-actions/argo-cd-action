name: Test options input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          command: version
          options: --client
      - name: Assert argocd version --client ran
        run: |
          which argocd || { echo "FAIL: argocd not found in PATH"; exit 1; }
          echo "PASS: argocd command with options executed successfully"
