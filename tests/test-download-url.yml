name: Test custom download-url input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          command: version
          options: --client
          version: 3.3.2
          download-url: https://github.com/argoproj/argo-cd/releases/download/v3.3.2/argocd-linux-amd64
      - name: Assert output contains version info
        env:
          ACTUAL: ${{ steps.action.outputs.output }}
        run: |
          echo "actual: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: expected non-empty output from argocd version --client via custom download-url"
            exit 1
          fi
          echo "PASS"
