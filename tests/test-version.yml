name: Test version input - install specific version
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          version: 3.0.0
      - name: Assert specific argocd version is installed
        run: |
          which argocd || { echo "FAIL: argocd not found in PATH"; exit 1; }
          INSTALLED_VERSION=$(argocd version --client --short 2>&1 | grep -oP 'v[\d.]+' | head -1)
          echo "Installed version: $INSTALLED_VERSION"
          if [ "$INSTALLED_VERSION" != "v3.0.0" ]; then
            echo "FAIL: expected v3.0.0 but got $INSTALLED_VERSION"
            exit 1
          fi
          echo "PASS: correct version installed"
