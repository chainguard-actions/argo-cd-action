name: Test specific version install
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          version: 3.3.2
          command: version
          options: --client
      - name: Assert output contains expected version
        env:
          ACTUAL: ${{ steps.action.outputs.output }}
        run: |
          echo "actual: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: expected non-empty output from argocd version --client"
            exit 1
          fi
          if ! echo "$ACTUAL" | grep -q "3.3.2"; then
            echo "FAIL: expected output to contain version 3.3.2"
            exit 1
          fi
          echo "PASS"
